<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Paper Summary</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 720px;
      margin: 60px auto;
      padding: 0 24px 80px;
      color: #1a1a1a;
      line-height: 1.7;
    }
    .tag {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #b31b1b;
      background: #fef2f2;
      border-radius: 4px;
      padding: 2px 8px;
      margin-bottom: 14px;
    }
    h1 {
      font-size: 1.45rem;
      font-weight: 700;
      line-height: 1.35;
      margin-bottom: 8px;
    }
    .meta {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 32px;
    }
    .meta a { color: #b31b1b; text-decoration: none; }
    .meta a:hover { text-decoration: underline; }
    .summary {
      background: #fafafa;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 24px 28px;
      font-size: 0.93rem;
    }
    .summary p { margin-bottom: 14px; }
    .summary p:last-child { margin-bottom: 0; }
    .summary ul { margin: 8px 0 14px 20px; }
    .summary li { margin-bottom: 5px; }
    .zotero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      color: #16a34a;
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 6px;
      padding: 5px 12px;
      margin-bottom: 24px;
    }
  </style>
</head>
<body>
  <div class="tag">arXiv</div>
  <h1 id="title">Loading…</h1>
  <div class="meta" id="meta"></div>
  <div class="zotero-badge">✓ Added to Zotero library</div>
  <div class="summary" id="summary"></div>

  <script src="summary.js"></script>
</body>
</html>
